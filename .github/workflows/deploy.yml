name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Generate Gradle Wrapper if missing
        run: |
          if [ ! -f "gradlew" ]; then
            echo "gradlew not found, generating wrapper..."
            gradle wrapper --gradle-version 9.0
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create empty .env and keystore config if not present
        run: |
          touch .env
          if [ ! -f "debug.keystore" ]; then
            echo "Generating fallback debug keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Prepare Public Directory
        run: |
          mkdir -p public
          cp app/build/outputs/apk/debug/app-debug.apk public/pc-sihirbazi.apk

      - name: Generate Elegant Landing Page
        run: |
          cat << 'EOF' > public/index.html
          <!DOCTYPE html>
          <html lang="tr" class="scroll-smooth">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>PC Sihirbazı - Akıllı PC Toplama & Uyumluluk Asistanı</title>
              <script src="https://cdn.tailwindcss.com"></script>
              <link rel="preconnect" href="https://fonts.googleapis.com">
              <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
              <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
              <style>
                  body { font-family: 'Plus Jakarta Sans', sans-serif; }
                  .code-font { font-family: 'JetBrains Mono', monospace; }
                  .animate-glow { animation: pulseGlow 8s infinite alternate; }
                  @keyframes pulseGlow {
                      0% { opacity: 0.3; transform: scale(1); }
                      100% { opacity: 0.6; transform: scale(1.1); }
                  }
              </style>
          </head>
          <body class="bg-[#0b0f19] text-slate-100 overflow-x-hidden selection:bg-purple-600 selection:text-white">
              <div class="absolute -top-40 -left-40 w-96 h-96 bg-purple-700 rounded-full blur-[150px] opacity-35 animate-glow pointer-events-none"></div>
              <div class="absolute top-[40%] -right-40 w-[500px] h-[500px] bg-indigo-700 rounded-full blur-[180px] opacity-25 animate-glow pointer-events-none" style="animation-delay: -3s;"></div>
              <div class="absolute bottom-[-10%] left-[20%] w-96 h-96 bg-violet-800 rounded-full blur-[150px] opacity-25 animate-glow pointer-events-none" style="animation-delay: -5s;"></div>

              <nav class="max-w-7xl mx-auto px-6 py-6 flex justify-between items-center relative z-10 border-b border-slate-800/50">
                  <div class="flex items-center space-x-3">
                      <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-purple-600 to-indigo-500 flex items-center justify-center shadow-lg shadow-purple-500/20">
                          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                          </svg>
                      </div>
                      <span class="text-xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white via-slate-100 to-indigo-200">PC Sihirbazı</span>
                  </div>
                  <div class="flex items-center space-x-6">
                      <a href="#ozellikler" class="text-sm font-medium text-slate-400 hover:text-white transition duration-200">Özellikler</a>
                      <a href="#uyumluluk" class="text-sm font-medium text-slate-400 hover:text-white transition duration-200">Sistem Uyumluluğu</a>
                      <a href="pc-sihirbazi.apk" class="px-4 py-2 rounded-lg bg-slate-800 hover:bg-slate-750 text-white text-sm font-semibold border border-slate-700/50 transition duration-200 shadow-md">APK İndir</a>
                  </div>
              </nav>

              <header class="max-w-7xl mx-auto px-6 pt-16 pb-24 relative z-10 grid lg:grid-cols-12 gap-12 items-center">
                  <div class="lg:col-span-7 space-y-8 text-left">
                      <div class="inline-flex items-center space-x-2 px-3 py-1.5 rounded-full bg-purple-900/40 border border-purple-500/30 text-purple-300 text-xs font-semibold tracking-wide uppercase">
                          <span>🤖 AKILLI PC TOPLAMA ASİSTANI</span>
                      </div>
                      <h1 class="text-4xl sm:text-5xl md:text-6xl font-extrabold tracking-tight leading-tight">
                          Gelişmiş PC Toplama & <br/>
                          <span class="bg-clip-text text-transparent bg-gradient-to-r from-purple-400 via-indigo-300 to-blue-400">Akıllı Uyumluluk Sihirbazı</span>
                      </h1>
                      <p class="text-lg md:text-xl text-slate-400 leading-relaxed max-w-2xl">
                          Donanım parçalarınızı seçin, sistemimiz anında soket, bellek nesli, güç (TDP) tüketimi, soğutucu uyumluluğu ve kasa boyutlarını test etsin.
                      </p>
                      <div class="flex flex-col sm:flex-row gap-4 pt-4">
                          <a href="pc-sihirbazi.apk" class="group flex items-center justify-center space-x-3 px-8 py-4 rounded-xl bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-bold transition duration-300 transform hover:-translate-y-0.5 shadow-xl shadow-purple-950/40">
                              <span>Hemen APK İndir (Direct Link)</span>
                          </a>
                          <a href="#ozellikler" class="flex items-center justify-center px-6 py-4 rounded-xl bg-slate-800/80 hover:bg-slate-700/85 text-slate-200 hover:text-white font-semibold border border-slate-700/60 transition duration-300">Özellikleri İncele</a>
                      </div>
                  </div>
              </header>

              <footer class="py-10 border-t border-slate-900 bg-slate-950/20 text-center text-sm text-slate-600 relative z-10">
                  <p>&copy; 2026 PC Sihirbazı. Tüm hakları saklıdır.</p>
              </footer>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
